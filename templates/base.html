<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 CineReview</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #e8c55a;
      --text: #e8e8f0;
      --muted: #6b6b8a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    main { padding: 3rem 2.5rem; max-width: 1100px; margin: 0 auto; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">CINEREVIEW</a>
    <ul class="nav-links">
      <li><a href="/" {% if request.path == '/' %}class="active"{% endif %}>HOME</a></li>
      <li><a href="/movies" {% if request.path == '/movies' %}class="active"{% endif %}>MOVIES</a></li>
      <li><a href="/review" {% if request.path == '/review' %}class="active"{% endif %}>REVIEW</a></li>
    </ul>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
